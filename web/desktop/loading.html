<!doctype html><html lang="ko"><head><meta charset="utf-8" />
<style>
  html,body{height:100%;margin:0;background:#f5f7fb;font-family:-apple-system,"Segoe UI",sans-serif;color:#1c2333;}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .logo{width:54px;height:54px;border-radius:15px;background:#2f6bed;color:#fff;display:grid;place-items:center;font-weight:800;font-size:26px;}
  .t{font-size:16px;font-weight:700;}
  .s{font-size:13px;color:#5a6477;}
  .sp{width:22px;height:22px;border:3px solid #dfe6f2;border-top-color:#2f6bed;border-radius:50%;animation:r .8s linear infinite;}
  @keyframes r{to{transform:rotate(360deg)}}
</style></head>
<body><div class="wrap">
  <div class="logo">S</div>
  <div class="t">Skills Manager</div>
  <div class="sp"></div>
  <div class="s">스킬을 읽는 중…</div>
</div></body></html>
