<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skills Manager — 스킬 정리 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <a class="brand" href="#/">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 3 7.5 12 12l9-4.5L12 3Z" fill="currentColor"/><path d="m3 12 9 4.5L21 12M3 16.5 12 21l9-4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity=".55"/></svg>
        </span>
        <span class="brand-txt"><b>Skills Manager</b><small>스킬 중복 지도 · 워크플로우</small></span>
      </a>

      <nav class="side-nav" id="nav" aria-label="화면 전환">
        <a href="#/" data-view="dashboard"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 13h7V4H4v9Zm0 7h7v-5H4v5Zm9 0h7v-9h-7v9Zm0-16v5h7V4h-7Z" fill="currentColor"/></svg><span>대시보드</span></a>
        <a href="#/overlap" data-view="overlap"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="9" cy="12" r="6" stroke="currentColor" stroke-width="1.7"/><circle cx="15" cy="12" r="6" stroke="currentColor" stroke-width="1.7"/></svg><span>중복 분석</span></a>
        <a href="#/recommend" data-view="recommend"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m12 3 2.6 5.7 6.4.6-4.8 4.3 1.4 6.4L12 17l-5.6 3 1.4-6.4L3 9.3l6.4-.6L12 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg><span>추천</span></a>
        <a href="#/workflows" data-view="workflows"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="6" cy="6" r="2.4" stroke="currentColor" stroke-width="1.7"/><circle cx="18" cy="12" r="2.4" stroke="currentColor" stroke-width="1.7"/><circle cx="6" cy="18" r="2.4" stroke="currentColor" stroke-width="1.7"/><path d="M8.4 6H14a3 3 0 0 1 3 3v.4M8.4 18H14a3 3 0 0 0 3-3v-.4" stroke="currentColor" stroke-width="1.6"/></svg><span>워크플로우</span></a>
        <a href="#/manage" data-view="manage"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3l7 3v5c0 4.2-2.9 7.7-7 9-4.1-1.3-7-4.8-7-9V6l7-3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg><span>스킬 정리</span></a>
        <a href="#/settings" data-view="settings"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.5H10l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.4L3.7 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .1-1Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg><span>설정</span></a>
      </nav>

      <div class="side-foot">
        <div class="status-card" id="statusCard">
          <div class="st-row"><span class="st-dot" aria-hidden="true"></span><span class="st-title">검사 상태</span><span class="st-badge">정상</span></div>
          <div class="st-sub">이 PC 안에서만 검사 · 읽기 전용</div>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <form class="search" id="searchForm" role="search">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="m11 11 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input id="q" type="search" placeholder="스킬, 워크플로우, 출처 검색…" autocomplete="off" aria-label="검색" />
          <kbd>⌘K</kbd>
        </form>
        <div class="top-actions">
          <span class="readonly-pill" title="이 도구는 스킬을 지우거나 바꾸지 않고, 보여주기만 합니다."><span class="dot" aria-hidden="true"></span>읽기 전용</span>
          <span class="avatar" aria-hidden="true">S</span>
        </div>
      </header>

      <main id="app">
        <p class="loading">불러오는 중…</p>
      </main>

      <footer class="foot">설치된 스킬을 살펴보고 정리를 도와드려요. 검사는 이 PC 안에서만 처리되고, 아무것도 바꾸지 않습니다.</footer>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
